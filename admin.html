<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobirecTech | Admin Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .login-wrapper {
            width: 100%;
            max-width: 1300px;
            margin: 20px;
            display: flex;
            border-radius: 50px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            animation: slideUp 0.6s ease;
        }

        /* Left Panel - Animation Section */
        .animation-panel {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(102,126,234,0.9), rgba(118,75,162,0.9));
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Floating Elements */
        .floating-element {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Character Container */
        .characters-container {
            position: relative;
            width: 100%;
            height: 350px;
            margin-bottom: 30px;
        }

        /* Man Character */
        .man-character {
            position: absolute;
            left: 10%;
            bottom: 0;
            width: 180px;
            animation: bounceMan 3s ease-in-out infinite;
        }

        .woman-character {
            position: absolute;
            right: 10%;
            bottom: 0;
            width: 180px;
            animation: bounceWoman 3s ease-in-out infinite;
        }

        @keyframes bounceMan {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes bounceWoman {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* Handshake Animation */
        .handshake-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            z-index: 10;
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(5deg); }
            75% { transform: translate(-50%, -50%) rotate(-5deg); }
        }

        /* Character SVG Styles */
        .character-svg {
            width: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        /* Working Animation */
        .working-animation {
            position: absolute;
            top: 20%;
            right: 5%;
            width: 60px;
            height: 60px;
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Code Particles */
        .code-particle {
            position: absolute;
            font-family: monospace;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            animation: codeFloat 3s linear infinite;
        }

        @keyframes codeFloat {
            from { transform: translateY(100%) rotate(0deg); opacity: 1; }
            to { transform: translateY(-100%) rotate(360deg); opacity: 0; }
        }

        /* Right Panel - Login Form */
        .login-panel {
            flex: 0.9;
            background: rgba(255, 255, 255, 0.98);
            padding: 50px 45px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group label i {
            color: #667eea;
            margin-right: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1rem;
            z-index: 2;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e8eef2;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .form-control:focus {
            border-color: #667eea;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .remember-me span {
            color: #666;
            font-size: 0.85rem;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .forgot-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
        }

        .spinner i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Brand Text */
        .brand-text {
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        .brand-text h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .brand-text p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* Animation */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 992px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 550px;
            }
            .animation-panel {
                padding: 30px;
                min-height: 400px;
            }
            .characters-container {
                height: 280px;
            }
            .man-character, .woman-character {
                width: 140px;
            }
            .login-panel {
                padding: 40px 30px;
            }
        }

        @media (max-width: 576px) {
            .login-wrapper {
                margin: 15px;
            }
            .animation-panel {
                padding: 20px;
            }
            .man-character, .woman-character {
                width: 100px;
            }
            .login-panel {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Panel - Animated Cartoon Section -->
        <div class="animation-panel">
            <!-- Floating Elements -->
            <div class="floating-element" style="width: 80px; height: 80px; top: 10%; left: 5%; animation-delay: 0s;"></div>
            <div class="floating-element" style="width: 50px; height: 50px; bottom: 15%; right: 10%; animation-delay: 1s;"></div>
            <div class="floating-element" style="width: 40px; height: 40px; top: 40%; right: 20%; animation-delay: 2s;"></div>
            
            <!-- Code Particles -->
            <div class="code-particle" style="left: 15%; top: 20%; animation-duration: 4s;">&lt;/&gt;</div>
            <div class="code-particle" style="left: 70%; top: 60%; animation-duration: 5s;">{ }</div>
            <div class="code-particle" style="left: 85%; top: 30%; animation-duration: 3.5s;">() =&gt;</div>
            <div class="code-particle" style="left: 25%; top: 75%; animation-duration: 4.5s;">&lt;div&gt;</div>
            
            <!-- Working Animation Icon -->
            <div class="working-animation">
                <i class="fas fa-cog" style="font-size: 50px; color: rgba(255,255,255,0.3);"></i>
            </div>
            
            <!-- Characters Container -->
            <div class="characters-container">
                <!-- Man Character (Working on Laptop) -->
                <div class="man-character">
                    <svg class="character-svg" viewBox="0 0 200 200" fill="none">
                        <!-- Body -->
                        <circle cx="100" cy="120" r="35" fill="#FFD966" stroke="#E6B800" stroke-width="2"/>
                        <!-- Head -->
                        <circle cx="100" cy="70" r="28" fill="#F4C542" stroke="#E6B800" stroke-width="2"/>
                        <!-- Eyes -->
                        <circle cx="85" cy="62" r="3" fill="#2C3E50"/>
                        <circle cx="115" cy="62" r="3" fill="#2C3E50"/>
                        <!-- Smile -->
                        <path d="M 88 78 Q 100 88, 112 78" stroke="#2C3E50" stroke-width="2" fill="none"/>
                        <!-- Hair -->
                        <path d="M 75 45 L 100 35 L 125 45" stroke="#8B4513" stroke-width="3" fill="#8B4513"/>
                        <!-- Laptop -->
                        <rect x="70" y="130" width="60" height="40" fill="#4A4A4A" rx="5"/>
                        <rect x="75" y="135" width="50" height="25" fill="#2C3E50" rx="3"/>
                        <!-- Tie -->
                        <polygon points="100,105 95,120 100,125 105,120 100,105" fill="#E74C3C"/>
                        <!-- Arm Working -->
                        <path d="M 130 115 L 145 110 L 140 100" stroke="#F4C542" stroke-width="8" fill="none" stroke-linecap="round"/>
                        <circle cx="145" cy="110" r="5" fill="#F4C542"/>
                        <!-- Mouse -->
                        <rect x="143" y="108" width="12" height="8" fill="#4A4A4A" rx="2"/>
                    </svg>
                </div>
                
                <!-- Handshake Animation -->
                <div class="handshake-container">
                    <i class="fas fa-handshake" style="font-size: 50px; color: #FFD966; text-shadow: 0 5px 15px rgba(0,0,0,0.3);"></i>
                </div>
                
                <!-- Woman Character (Working on Tablet) -->
                <div class="woman-character">
                    <svg class="character-svg" viewBox="0 0 200 200" fill="none">
                        <!-- Body -->
                        <circle cx="100" cy="120" r="32" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
                        <!-- Head -->
                        <circle cx="100" cy="72" r="26" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
                        <!-- Eyes -->
                        <circle cx="85" cy="65" r="3" fill="#2C3E50"/>
                        <circle cx="115" cy="65" r="3" fill="#2C3E50"/>
                        <!-- Smile -->
                        <path d="M 88 80 Q 100 88, 112 80" stroke="#2C3E50" stroke-width="2" fill="none"/>
                        <!-- Hair -->
                        <path d="M 75 48 Q 100 35, 125 48" stroke="#8B4513" stroke-width="3" fill="#8B4513"/>
                        <circle cx="100" cy="45" r="12" fill="#8B4513"/>
                        <!-- Dress -->
                        <polygon points="80,120 120,120 115,150 100,160 85,150 80,120" fill="#FF69B4"/>
                        <!-- Tablet -->
                        <rect x="75" y="128" width="50" height="35" fill="#4A4A4A" rx="5"/>
                        <rect x="80" y="133" width="40" height="25" fill="#2C3E50" rx="3"/>
                        <!-- Arm Working -->
                        <path d="M 125 118 L 140 115 L 138 105" stroke="#FFB6C1" stroke-width="7" fill="none" stroke-linecap="round"/>
                        <!-- Pen -->
                        <line x1="142" y1="108" x2="148" y2="102" stroke="#FF69B4" stroke-width="2"/>
                    </svg>
                </div>
            </div>
            
            <!-- Brand Text -->
            <div class="brand-text">
                <h3>Team Collaboration</h3>
                <p>Working together to build the future of digital India</p>
            </div>
        </div>

        <!-- Right Panel - Login Form -->
        <div class="login-panel">
            <div class="login-header">
                <h2>Welcome Back!</h2>
                <p>Sign in to access your admin dashboard</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Login to Dashboard</span>
                    <span class="spinner" id="spinner"><i class="fas fa-spinner"></i></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Create additional floating particles
        function createParticles() {
            const container = document.querySelector('.animation-panel');
            if (container) {
                for (let i = 0; i < 15; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('floating-element');
                    particle.style.width = Math.random() * 15 + 5 + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 5 + 's';
                    particle.style.animationDuration = Math.random() * 5 + 3 + 's';
                    container.appendChild(particle);
                }
            }
        }
        createParticles();

        // ==================== FIREBASE CONFIGURATION ====================

        const firebaseConfig = {
            apiKey: "AIzaSyA9AiscgvOeUDv0h5rPHwTaFDsXgwfO8W4",
            authDomain: "mobtech-5ceac.firebaseapp.com",
            projectId: "mobtech-5ceac",
            storageBucket: "mobtech-5ceac.appspot.com",
            messagingSenderId: "989743281667",
            appId: "1:989743281667:web:1d8b3249571d518d364036"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user && localStorage.getItem('token')) {
                window.location.href = 'dashboard.html';
            }
        });

        // Forgot Password Function
        window.forgotPassword = function(e) {
            if (e) e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) {
                const alertMsg = document.getElementById('alertMessage');
                alertMsg.className = 'alert alert-danger';
                alertMsg.textContent = '❌ Please enter your email address first!';
                alertMsg.style.display = 'block';
                setTimeout(() => alertMsg.style.display = 'none', 3000);
                return;
            }
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    const alertMsg = document.getElementById('alertMessage');
                    alertMsg.className = 'alert alert-success';
                    alertMsg.textContent = '✅ Password reset email sent! Check your inbox.';
                    alertMsg.style.display = 'block';
                    setTimeout(() => alertMsg.style.display = 'none', 3000);
                })
                .catch((error) => {
                    const alertMsg = document.getElementById('alertMessage');
                    alertMsg.className = 'alert alert-danger';
                    alertMsg.textContent = '❌ ' + error.message;
                    alertMsg.style.display = 'block';
                    setTimeout(() => alertMsg.style.display = 'none', 3000);
                });
        };

        // Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            const alertMsg = document.getElementById('alertMessage');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            
            alertMsg.style.display = 'none';
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'inline';
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                if (remember) {
                    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                } else {
                    await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
                }
                
                alertMsg.className = 'alert alert-success';
                alertMsg.textContent = '✅ Login successful! Redirecting to dashboard...';
                alertMsg.style.display = 'block';
                
                localStorage.setItem('token', await user.getIdToken());
                localStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || 'Admin User'
                }));
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = '';
                switch(error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No user found with this email! Please check your email.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Wrong password! Please try again.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email address! Please enter a valid email.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'This account has been disabled. Please contact admin.';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                alertMsg.className = 'alert alert-danger';
                alertMsg.textContent = '❌ ' + errorMessage;
                alertMsg.style.display = 'block';
                
                loginBtn.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
                
                setTimeout(() => alertMsg.style.display = 'none', 5000);
            }
        });
    </script>
</body>
</html>
